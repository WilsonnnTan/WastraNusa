name: CI
run-name: CI for commit ${{ github.sha }} by @${{ github.actor }}

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

# temp .env for CI
env:
  NODE_ENV: development
  BETTER_AUTH_SECRET: my-betterauth-secret
  POSTGRES_USER: testuser
  POSTGRES_PASSWORD: testpassword
  POSTGRES_DB: testdb
  DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb
  DIRECT_URL: postgresql://testuser:testpassword@localhost:5432/testdb

jobs:
  ci:
    name: Lint, Prettier, and Test Case Check
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5432:5432

    steps:
      - name: Checkout branch
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: '22.18'
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install

      - name: Lint check
        run: pnpm lint

      - name: Prettier check
        run: pnpm format:check

      # Migrate before test
      - name: Run migration
        run: pnpm prisma migrate dev

      - name: Generate prisma client
        run: pnpm prisma generate

      - name: Run seeding scripts
        run: pnpm prisma db seed

      - name: Run test cases
        run: pnpm run test

      - name: Run Build
        run: pnpm run build
